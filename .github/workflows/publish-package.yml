name: Publish Koyo UI Package

on:
  workflow_dispatch:
  release:
    types:
      - created

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Verify package boundary
        run: pnpm verify:library-boundary

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.KOYO_UI_PUBLISHING_NPM_TOKEN }}

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./packages/koyo-ui/package.json').version")

          if npm view "@newtonschool/koyo-ui@$VERSION" version >/dev/null 2>&1; then
            echo "@newtonschool/koyo-ui@$VERSION is already published; skipping."
            exit 0
          fi

          npm publish ./packages/koyo-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.KOYO_UI_PUBLISHING_NPM_TOKEN }}
